<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 맞춤형 운동 루틴 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- 1. 메인 화면 -->
        <section id="step-main" class="page-section active">
            <div class="main-welcome">
                <span class="emoji">⚡</span>
                <h1>나만의 맞춤형<br>운동 루틴을 찾아보세요</h1>
                <p>오늘 바로 따라 할 수 있는<br>최적의 운동 프로그램을 추천해 드립니다.</p>
                <button id="start-btn" class="action-btn">오늘의 운동 시작하기 🚀</button>
            </div>
        </section>

        <!-- 2. 선택 화면 -->
        <section id="step-select" class="page-section">
            <header class="section-header">
                <h2>원하는 운동 조건을 골라주세요</h2>
                <p>부위는 중복 선택이 가능합니다.</p>
            </header>

            <div class="filter-box">

                <!-- 1) 목적 선택 (단일) -->
                <div class="filter-group">
                    <label>1. 운동 목적이 무엇인가요? <span class="required">*필수</span></label>
                    <div class="buttons" id="goal-filters">
                        <button type="button" class="btn" data-value="웨이트">🏋️ 웨이트</button>
                        <button type="button" class="btn" data-value="유산소">🧘 유산소 / 스트레칭</button>
                    </div>
                </div>

                <!-- 2) 운동 부위 선택 (중복 가능) -->
                <div class="filter-group">
                    <label>2. 어디를 운동하고 싶으신가요? <span class="required">*필수</span></label>
                    <div class="buttons" id="body-part-filters">
                        <button type="button" class="btn multi" data-value="다리">다리</button>
                        <button type="button" class="btn multi" data-value="팔">팔</button>
                        <button type="button" class="btn multi" data-value="가슴">가슴</button>
                        <button type="button" class="btn multi" data-value="배">배</button>
                        <button type="button" class="btn multi" data-value="힙">힙</button>
                        <button type="button" class="btn multi" data-value="등">등</button>
                        <button type="button" class="btn multi" data-value="어깨">어깨</button>
                        <button type="button" class="btn multi disabled" data-value="스트레칭" id="stretching-btn" disabled>스트레칭</button>
                    </div>
                </div>

                <!-- 3) 운동 도구 선택 (중복 가능) -->
                <div class="filter-group">
                    <label>3. 어떤 도구를 사용할 수 있나요? <span class="required">*필수</span></label>
                    <div class="buttons" id="equipment-filters">
                        <button type="button" class="btn multi" data-value="헬스장">헬스장</button>
                        <button type="button" class="btn multi" data-value="맨몸">맨몸</button>
                        <button type="button" class="btn multi" data-value="소도구">소도구</button>
                    </div>
                </div>

                <!-- 4) 난이도 선택 (단일) -->
                <div class="filter-group">
                    <label>4. 난이도를 선택해주세요 <span class="required">*필수</span></label>
                    <div class="buttons" id="level-filters">
                        <button type="button" class="btn" data-value="초급">초급 (10회 × 2세트)</button>
                        <button type="button" class="btn" data-value="중급">중급 (15회 × 3세트)</button>
                        <button type="button" class="btn" data-value="고급">고급 (20회 × 4세트)</button>
                    </div>
                </div>
                
                <button id="search-btn" class="action-btn">내 루틴 확인하기 🎯</button>
            </div>
        </section>

        <!-- 3. 결과 화면 -->
        <section id="step-result" class="page-section">
            <header class="section-header">
                <h2>오늘의 추천 운동 루틴입니다!</h2>
                <p>영상을 보며 바른 자세로 따라 해보세요.</p>
            </header>

            <div class="video-player-container">
                <div id="video-frame" class="video-placeholder">
                    <span>📺 하단 카드에서 [영상 보기]를 누르면 여기에 재생됩니다.</span>
                </div>
            </div>

            <div class="card-container" id="workout-results"></div>

            <button type="button" id="save-routine-btn" class="action-btn" style="margin-top:20px;">오늘의 루틴 저장 💾</button>
            <p id="weekly-stats" style="text-align:center; color:#8d99ae; font-size:13px; margin-top:15px;"></p>
            <button id="back-to-main-btn" class="sub-btn">처음부터 다시 찾기 🔄</button>
        </section>

        <!-- 4. 즐겨찾기 화면 -->
        <section id="step-favorites" class="page-section">
            <header class="section-header">
                <h2>즐겨찾기 목록 ❤️</h2>
                <p>저장한 운동 목록이에요.</p>
            </header>
            <div class="card-container" id="favorites-list"></div>
            <button id="back-from-favorites-btn" class="sub-btn" style="margin-top:20px;">돌아가기 🔙</button>
        </section>


        <!-- 5. 루틴 기록 화면 -->
        <section id="step-history" class="page-section">
            <header class="section-header">
                <h2>루틴 기록 📋</h2>
                <p>저장한 운동 기록이에요.</p>
            </header>
            <div class="card-container" id="history-list"></div>
            <button id="back-from-history-btn" class="sub-btn" style="margin-top:20px;">돌아가기 🔙</button>
        </section>

    </div>

    <!-- 즐겨찾기 고정 버튼 -->
    <button id="favorites-btn" onclick="showFavorites()">❤️ 즐겨찾기</button>
    <button id="history-btn" onclick="showHistory()">📋 루틴 기록</button>

    <script>
        function navigateToPage(stepId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        document.getElementById('start-btn').addEventListener('click', () => navigateToPage('step-select'));
        document.getElementById('back-to-main-btn').addEventListener('click', () => navigateToPage('step-main'));
        document.getElementById('back-from-favorites-btn').addEventListener('click', () => navigateToPage('step-main'));
        document.getElementById('back-from-history-btn').addEventListener('click', () => navigateToPage('step-main'));

        // 목적 단일 선택 + 부위 연동
        document.querySelectorAll('#goal-filters .btn').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('#goal-filters .btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const goal = this.dataset.value;
                const bodyBtns = document.querySelectorAll('#body-part-filters .btn');
                const stretchingBtn = document.getElementById('stretching-btn');

                if (goal === '유산소') {
                    // 유산소: 스트레칭만 활성화, 나머지 비활성화
                    bodyBtns.forEach(b => {
                        b.classList.remove('active');
                        if (b.dataset.value !== '스트레칭') {
                            b.classList.add('disabled');
                            b.disabled = true;
                        }
                    });
                    stretchingBtn.classList.remove('disabled');
                    stretchingBtn.disabled = false;
                    stretchingBtn.classList.add('active');
                } else {
                    // 웨이트: 스트레칭 비활성화, 나머지 활성화
                    bodyBtns.forEach(b => {
                        b.classList.remove('disabled', 'active');
                        b.disabled = false;
                    });
                    stretchingBtn.classList.add('disabled');
                    stretchingBtn.disabled = true;
                    stretchingBtn.classList.remove('active');
                }
            });
        });

        // 부위 중복 선택
        document.querySelectorAll('#body-part-filters .btn.multi').forEach(button => {
            button.addEventListener('click', function() {
                if (!this.disabled) this.classList.toggle('active');
            });
        });

        // 도구 중복 선택
        document.querySelectorAll('#equipment-filters .btn').forEach(button => {
            button.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        // 난이도 단일 선택
        document.querySelectorAll('#level-filters .btn').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('#level-filters .btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
